edition: 3.0.0
name: report-agent
access: default

vars:
  region: ap-southeast-1

resources:
  report_agent:
    component: fc3
    actions:
      pre-deploy:
        - component: fc3 build --dockerfile ../../Dockerfile
    props:
      region: ${vars.region}
      functionName: report-agent
      description: Persistent multimodal MemoryAgent powered by Qwen Cloud
      runtime: custom-container
      timeout: 300
      memorySize: 1024
      cpu: 1
      diskSize: 512
      instanceConcurrency: 10
      code: ../../
      customContainerConfig:
        image: registry.${vars.region}.aliyuncs.com/REPLACE_NAMESPACE/report-agent:latest
        port: 3000
      environmentVariables:
        OPENAI_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
        OPENAI_MODEL: qwen3.7-plus
      triggers:
        - triggerName: public-http
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods: [GET, POST, PUT, HEAD, OPTIONS]
